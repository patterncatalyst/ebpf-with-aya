<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1220 540" width="1220" height="540"><defs><marker id="_arrow_svc_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0066CC"/></marker><marker id="_arrow_platform_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#006E6E"/></marker><marker id="_arrow_danger_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#B71C1C"/></marker></defs><rect x="0" y="0" width="1220" height="540" fill="#FFFFFF"/><text x="610.0" y="36" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="22" font-weight="bold" fill="#4A4A4A" text-anchor="middle">LSM programs: allow or deny, in-kernel</text><text x="610.0" y="64" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="normal" fill="#5A5A5A" text-anchor="middle">An eBPF program at a Linux Security Module hook returns the verdict.</text><rect x="80" y="200" width="230" height="100" rx="8" ry="8" fill="#FFFFFF" stroke="#0066CC" stroke-width="1.6"/><text x="195.0" y="224" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Operation</text><text x="195.0" y="244" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">exec, open, kill,</text><text x="195.0" y="260" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">connect …</text><rect x="420" y="190" width="240" height="120" rx="8" ry="8" fill="#FFFFFF" stroke="#B36B00" stroke-width="1.6"/><text x="540.0" y="214" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">LSM hook</text><text x="540.0" y="234" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">bprm_check_security</text><text x="540.0" y="250" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">file_open, task_kill</text><text x="540.0" y="266" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">your eBPF runs here</text><rect x="780" y="120" width="220" height="90" rx="8" ry="8" fill="#FFFFFF" stroke="#006E6E" stroke-width="1.6"/><text x="890.0" y="144" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">return 0</text><text x="890.0" y="164" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">-&gt; allow</text><rect x="780" y="280" width="220" height="90" rx="8" ry="8" fill="#FFFFFF" stroke="#B71C1C" stroke-width="1.6"/><text x="890.0" y="304" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">return -EPERM</text><text x="890.0" y="324" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">-&gt; deny</text><line x1="310" y1="250" x2="420" y2="250" stroke="#0066CC" stroke-width="1.6" marker-end="url(#_arrow_svc_0)"/><line x1="660" y1="220" x2="780" y2="165" stroke="#006E6E" stroke-width="1.6" marker-end="url(#_arrow_platform_0)"/><line x1="660" y1="280" x2="780" y2="320" stroke="#B71C1C" stroke-width="1.6" marker-end="url(#_arrow_danger_0)"/><rect x="80" y="420" width="920" height="60" rx="8" ry="8" fill="#F4F4F4" stroke="#D2D2D2" stroke-width="1"/><text x="102" y="455" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">Unlike tracing, an LSM program's return value is a decision — this is enforcement, not just observation.</text></svg>