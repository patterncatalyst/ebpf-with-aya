<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 560" width="1260" height="560"><defs><marker id="_arrow_neutral_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4A4A4A"/></marker><marker id="_arrow_govern_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#B36B00"/></marker><marker id="_arrow_platform_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#006E6E"/></marker><marker id="_arrow_svc_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0066CC"/></marker></defs><rect x="0" y="0" width="1260" height="560" fill="#FFFFFF"/><text x="630.0" y="36" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="22" font-weight="bold" fill="#4A4A4A" text-anchor="middle">CO-RE: compile once, run on many kernels</text><text x="630.0" y="64" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="normal" fill="#5A5A5A" text-anchor="middle">BTF describes each kernel's types; relocations rewrite field offsets at load.</text><rect x="70" y="170" width="250" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#EE0000" stroke-width="1.6"/><text x="195.0" y="194" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Your program</text><text x="195.0" y="214" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">reads task-&gt;pid</text><text x="195.0" y="230" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">compiled once</text><rect x="400" y="150" width="240" height="90" rx="8" ry="8" fill="#FFFFFF" stroke="#B36B00" stroke-width="1.6"/><text x="520.0" y="174" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">BTF (build)</text><text x="520.0" y="194" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">types you compiled</text><text x="520.0" y="210" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">against — vmlinux</text><rect x="400" y="300" width="240" height="90" rx="8" ry="8" fill="#FFFFFF" stroke="#006E6E" stroke-width="1.6"/><text x="520.0" y="324" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">BTF (target)</text><text x="520.0" y="344" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">the running kernel's</text><text x="520.0" y="360" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">actual layout</text><rect x="760" y="220" width="230" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#0066CC" stroke-width="1.6"/><text x="875.0" y="244" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Loader relocates</text><text x="875.0" y="264" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">field offsets fixed</text><text x="875.0" y="280" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">up at load time</text><text x="875.0" y="296" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">no recompile</text><rect x="1050" y="220" width="150" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#6A1B9A" stroke-width="1.6"/><text x="1125.0" y="244" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Runs</text><text x="1125.0" y="264" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">portable</text><text x="1125.0" y="280" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">one binary</text><line x1="320" y1="225" x2="400" y2="200" stroke="#4A4A4A" stroke-width="1.6" marker-end="url(#_arrow_neutral_0)"/><line x1="640" y1="200" x2="760" y2="255" stroke="#B36B00" stroke-width="1.6" marker-end="url(#_arrow_govern_0)"/><line x1="640" y1="340" x2="760" y2="290" stroke="#006E6E" stroke-width="1.6" marker-end="url(#_arrow_platform_0)"/><line x1="990" y1="275" x2="1050" y2="275" stroke="#0066CC" stroke-width="1.6" marker-end="url(#_arrow_svc_0)"/><rect x="70" y="420" width="1130" height="60" rx="8" ry="8" fill="#F4F4F4" stroke="#D2D2D2" stroke-width="1"/><text x="92" y="455" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">Without CO-RE a struct-offset change between kernels breaks the program; with it, the loader patches offsets.</text></svg>