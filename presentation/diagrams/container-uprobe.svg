<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 600" width="1280" height="600"><defs><marker id="_arrow_neutral_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4A4A4A"/></marker><marker id="_arrow_svc_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0066CC"/></marker><marker id="_arrow_platform_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#006E6E"/></marker></defs><rect x="0" y="0" width="1280" height="600" fill="#FFFFFF"/><text x="640.0" y="36" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="22" font-weight="bold" fill="#4A4A4A" text-anchor="middle">Uprobing a binary inside a rootless container</text><text x="640.0" y="64" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="normal" fill="#5A5A5A" text-anchor="middle">The container hides the file; the symbols are split out. Two problems, two fixes.</text><rect x="70" y="150" width="250" height="100" rx="8" ry="8" fill="#FFFFFF" stroke="#6A1B9A" stroke-width="1.6"/><text x="195.0" y="174" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">App in container</text><text x="195.0" y="194" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">rootless podman</text><text x="195.0" y="210" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">stripped binary</text><rect x="70" y="320" width="250" height="100" rx="8" ry="8" fill="#FFFFFF" stroke="#B36B00" stroke-width="1.6"/><text x="195.0" y="344" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">dbgsym package</text><text x="195.0" y="364" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">.debug (symbols)</text><text x="195.0" y="380" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">split via debuglink</text><rect x="470" y="150" width="260" height="100" rx="8" ry="8" fill="#FFFFFF" stroke="#0066CC" stroke-width="1.6"/><text x="600.0" y="174" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Extract + merge</text><text x="600.0" y="194" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">eu-unstrip:</text><text x="600.0" y="210" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">.debug -&gt; binary</text><rect x="470" y="320" width="260" height="100" rx="8" ry="8" fill="#FFFFFF" stroke="#006E6E" stroke-width="1.6"/><text x="600.0" y="344" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Bind-mount copy</text><text x="600.0" y="364" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">host-visible inode</text><text x="600.0" y="380" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">the container runs</text><rect x="880" y="230" width="240" height="120" rx="8" ry="8" fill="#FFFFFF" stroke="#EE0000" stroke-width="1.6"/><text x="1000.0" y="254" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">uprobe attaches</text><text x="1000.0" y="274" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">symbol in .symtab</text><text x="1000.0" y="290" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">with real offsets</text><text x="1000.0" y="306" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">aya resolves it</text><line x1="320" y1="200" x2="470" y2="200" stroke="#4A4A4A" stroke-width="1.6" marker-end="url(#_arrow_neutral_0)"/><line x1="320" y1="370" x2="470" y2="370" stroke="#4A4A4A" stroke-width="1.6" marker-end="url(#_arrow_neutral_0)"/><line x1="730" y1="210" x2="880" y2="270" stroke="#0066CC" stroke-width="1.6" marker-end="url(#_arrow_svc_0)"/><line x1="730" y1="360" x2="880" y2="310" stroke="#006E6E" stroke-width="1.6" marker-end="url(#_arrow_platform_0)"/><rect x="70" y="470" width="1140" height="90" rx="8" ry="8" fill="#F4F4F4" stroke="#D2D2D2" stroke-width="1"/><text x="92" y="500" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">Rootless podman keeps the container's binary out of the host namespace, so the (root) loader can't see it —</text><text x="92" y="522" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">bind-mount a host copy in. And a split-debug .debug has a NOBITS .text, so merge it back with eu-unstrip</text><text x="92" y="544" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">(the Postgres and nginx chapters). Then the symbol resolves with a real file offset.</text></svg>