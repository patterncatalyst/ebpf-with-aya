<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 560" width="1240" height="560"><defs><marker id="_arrow_data_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6A1B9A"/></marker></defs><rect x="0" y="0" width="1240" height="560" fill="#FFFFFF"/><text x="620.0" y="36" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="22" font-weight="bold" fill="#4A4A4A" text-anchor="middle">The Aya workspace: two halves that share types</text><text x="620.0" y="64" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="normal" fill="#5A5A5A" text-anchor="middle">One Cargo workspace, two targets — kernel BPF and user-space host.</text><rect x="90" y="160" width="300" height="130" rx="8" ry="8" fill="#FFFFFF" stroke="#EE0000" stroke-width="1.6"/><text x="240.0" y="184" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">hello-ebpf</text><text x="240.0" y="204" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">#![no_std] kernel crate</text><text x="240.0" y="220" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">nightly + BPF target</text><text x="240.0" y="236" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">the program the kernel runs</text><rect x="850" y="160" width="300" height="130" rx="8" ry="8" fill="#FFFFFF" stroke="#0066CC" stroke-width="1.6"/><text x="1000.0" y="184" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">hello (loader)</text><text x="1000.0" y="204" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">std user-space crate</text><text x="1000.0" y="220" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">stable Rust toolchain</text><text x="1000.0" y="236" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">loads, attaches, reports</text><rect x="470" y="190" width="300" height="90" rx="8" ry="8" fill="#FFFFFF" stroke="#6A1B9A" stroke-width="1.6"/><text x="620.0" y="214" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">hello-common</text><text x="620.0" y="234" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">#[repr(C)] shared structs</text><text x="620.0" y="250" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">compiled into BOTH sides</text><line x1="470" y1="235" x2="390" y2="225" stroke="#6A1B9A" stroke-width="1.6" marker-end="url(#_arrow_data_0)"/><line x1="770" y1="235" x2="850" y2="225" stroke="#6A1B9A" stroke-width="1.6" marker-end="url(#_arrow_data_0)"/><rect x="90" y="360" width="1060" height="90" rx="8" ry="8" fill="#F4F4F4" stroke="#D2D2D2" stroke-width="1"/><text x="112" y="388" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">build.rs (aya-build) compiles the -ebpf crate for the BPF target and embeds the object;</text><text x="112" y="412" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">bpf-linker links the bytecode. The loader includes it with include_bytes_aligned!.</text></svg>