<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520"><defs><marker id="_arrow_rest_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#EE0000"/></marker><marker id="_arrow_data_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6A1B9A"/></marker></defs><rect x="0" y="0" width="1200" height="520" fill="#FFFFFF"/><text x="600.0" y="36" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="22" font-weight="bold" fill="#4A4A4A" text-anchor="middle">Ring buffer: streaming events to user space in order</text><text x="600.0" y="64" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="normal" fill="#5A5A5A" text-anchor="middle">Reserve → fill → submit in the kernel; drain in a poll loop.</text><rect x="80" y="180" width="240" height="100" rx="8" ry="8" fill="#FFFFFF" stroke="#EE0000" stroke-width="1.6"/><text x="200.0" y="204" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">eBPF program</text><text x="200.0" y="224" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">reserve::&lt;Event&gt;()</text><text x="200.0" y="240" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">write fields, submit()</text><rect x="450" y="170" width="260" height="120" rx="8" ry="8" fill="#FFFFFF" stroke="#6A1B9A" stroke-width="1.6"/><text x="580.0" y="194" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">RingBuf</text><text x="580.0" y="214" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">lock-free queue</text><text x="580.0" y="230" font-family="Red Hat 