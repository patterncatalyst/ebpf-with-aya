<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 600" width="1240" height="600"><defs><marker id="_arrow_neutral_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4A4A4A"/></marker><marker id="_arrow_govern_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#B36B00"/></marker><marker id="_arrow_platform_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#006E6E"/></marker><marker id="_arrow_rest_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#EE0000"/></marker></defs><rect x="0" y="0" width="1240" height="600" fill="#FFFFFF"/><text x="620.0" y="36" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="22" font-weight="bold" fill="#4A4A4A" text-anchor="middle">How an eBPF program gets into the kernel</text><text x="620.0" y="64" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="normal" fill="#5A5A5A" text-anchor="middle">Write in Rust, compile to BPF bytecode, load → verify → attach.</text><rect x="70" y="150" width="250" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#0066CC" stroke-width="1.6"/><text x="195.0" y="174" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Your Rust code</text><text x="195.0" y="194" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">#[tracepoint] fn …</text><text x="195.0" y="210" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">compiled to BPF bytecode</text><rect x="400" y="150" width="240" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#0066CC" stroke-width="1.6"/><text x="520.0" y="174" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Loader (user space)</text><text x="520.0" y="194" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">aya: Ebpf::load()</text><text x="520.0" y="210" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">runs under CAP_BPF</text><rect x="720" y="130" width="210" height="90" rx="8" ry="8" fill="#FFFFFF" stroke="#B36B00" stroke-width="1.6"/><text x="825.0" y="154" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Verifier</text><text x="825.0" y="174" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">proves safety:</text><text x="825.0" y="190" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">bounds, loops, memory</text><rect x="720" y="250" width="210" height="90" rx="8" ry="8" fill="#FFFFFF" stroke="#006E6E" stroke-width="1.6"/><text x="825.0" y="274" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">JIT</text><text x="825.0" y="294" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">bytecode → native</text><text x="825.0" y="310" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">runs at kernel speed</text><rect x="1000" y="150" width="180" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#EE0000" stroke-width="1.6"/><text x="1090.0" y="174" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Attached hook</text><text x="1090.0" y="194" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">fires on the event</text><text x="1090.0" y="210" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">(syscall, packet, …)</text><line x1="320" y1="205" x2="400" y2="205" stroke="#4A4A4A" stroke-width="1.6" marker-end="url(#_arrow_neutral_0)"/><line x1="640" y1="195" x2="720" y2="175" stroke="#B36B00" stroke-width="1.6" marker-end="url(#_arrow_govern_0)"/><text x="680.0" y="179.0" font-family="Red Hat Text, Arial, sans-serif" font-size="11" fill="#5A5A5A" text-anchor="middle">load</text><line x1="825" y1="220" x2="825" y2="250" stroke="#006E6E" stroke-width="1.6" marker-end="url(#_arrow_platform_0)"/><line x1="930" y1="250" x2="1000" y2="210" stroke="#EE0000" stroke-width="1.6" marker-end="url(#_arrow_rest_0)"/><text x="965.0" y="224.0" font-family="Red Hat Text, Arial, sans-serif" font-size="11" fill="#5A5A5A" text-anchor="middle">attach</text><rect x="400" y="380" width="530" height="70" rx="8" ry="8" fill="#F4F4F4" stroke="#D2D2D2" stroke-width="1"/><text x="420" y="410" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">The verifier is the trust boundary: reject anything unsafe, at load time.</text></svg>