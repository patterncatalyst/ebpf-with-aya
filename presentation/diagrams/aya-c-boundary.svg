<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 560" width="1240" height="560"><rect x="0" y="0" width="1240" height="560" fill="#FFFFFF"/><text x="620.0" y="36" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="22" font-weight="bold" fill="#4A4A4A" text-anchor="middle">Where Aya is all-Rust — and where C still leads</text><text x="620.0" y="64" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="normal" fill="#5A5A5A" text-anchor="middle">An honest map of the 2026 boundary.</text><rect x="70" y="140" width="540" height="340" rx="8" ry="8" fill="#F4F4F4" stroke="#D2D2D2" stroke-width="1"/><text x="96" y="172" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="15" font-weight="bold" fill="#006E6E" text-anchor="start">All-Rust, today</text><rect x="96" y="200" width="490" height="60" rx="8" ry="8" fill="#FFFFFF" stroke="#006E6E" stroke-width="1.6"/><text x="341.0" y="224" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Tracing</text><text x="341.0" y="244" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">tracepoint, kprobe, fentry/fexit, uprobe</text><rect x="96" y="275" width="490" height="60" rx="8" ry="8" fill="#FFFFFF" stroke="#006E6E" stroke-width="1.6"/><text x="341.0" y="299" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Networking</text><text x="341.0" y="319" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">XDP, tc/tcx, socket ops</text><rect x="96" y="350" width="490" height="60" rx="8" ry="8" fill="#FFFFFF" stroke="#006E6E" stroke-width="1.6"/><text x="341.0" y="374" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Security + maps + perf</text><text x="341.0" y="394" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">LSM, all map types, ring buffers, perf events</text><rect x="650" y="140" width="520" height="340" rx="8" ry="8" fill="#F4F4F4" stroke="#D2D2D2" stroke-width="1"/><text x="676" y="172" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="15" font-weight="bold" fill="#B36B00" text-anchor="start">C reference still leads</text><rect x="676" y="200" width="470" height="60" rx="8" ry="8" fill="#FFFFFF" stroke="#B36B00" stroke-width="1.6"/><text x="911.0" y="224" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">struct_ops / sched_ext</text><text x="911.0" y="244" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">kernel vtables + schedulers — C + bpftool/scx</text><rect x="676" y="275" width="470" height="60" rx="8" ry="8" fill="#FFFFFF" stroke="#B36B00" stroke-width="1.6"/><text x="911.0" y="299" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">BPF iterators / arena</text><text x="911.0" y="319" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">emerging aya authoring; C is canonical</text><rect x="676" y="350" width="470" height="60" rx="8" ry="8" fill="#FFFFFF" stroke="#B36B00" stroke-width="1.6"/><text x="911.0" y="374" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">kfunc call relocations</text><text x="911.0" y="394" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">aya-ebpf can't emit them yet — documented</text></svg>