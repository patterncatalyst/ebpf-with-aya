<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 600" width="1280" height="600"><rect x="0" y="0" width="1280" height="600" fill="#FFFFFF"/><text x="640.0" y="36" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="22" font-weight="bold" fill="#4A4A4A" text-anchor="middle">The frontier: program types beyond tracing &amp; networking</text><text x="640.0" y="64" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="normal" fill="#5A5A5A" text-anchor="middle">Where eBPF stops observing and starts implementing kernel behavior.</text><rect x="70" y="150" width="270" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#EE0000" stroke-width="1.6"/><text x="205.0" y="174" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">struct_ops</text><text x="205.0" y="194" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">implement a kernel</text><text x="205.0" y="210" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">vtable in BPF</text><text x="205.0" y="226" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">e.g. TCP congestion</text><rect x="370" y="150" width="270" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#0066CC" stroke-width="1.6"/><text x="505.0" y="174" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">sched_ext</text><text x="505.0" y="194" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">a whole CPU</text><text x="505.0" y="210" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">scheduler in BPF</text><text x="505.0" y="226" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">swap it at runtime</text><rect x="670" y="150" width="270" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#006E6E" stroke-width="1.6"/><text x="805.0" y="174" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">kfuncs</text><text x="805.0" y="194" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">call kernel functions</text><text x="805.0" y="210" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">the kernel exports</text><text x="805.0" y="226" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">typed, allow-listed</text><rect x="970" y="150" width="240" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#B36B00" stroke-width="1.6"/><text x="1090.0" y="174" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">bpf_timer</text><text x="1090.0" y="194" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">kernel-side timers</text><text x="1090.0" y="210" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">callbacks without</text><text x="1090.0" y="226" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">user space</text><rect x="220" y="320" width="270" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#6A1B9A" stroke-width="1.6"/><text x="355.0" y="344" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">user_ringbuf</text><text x="355.0" y="364" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">user -&gt; kernel queue</text><text x="355.0" y="380" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">dynptr callbacks</text><rect x="520" y="320" width="270" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#006E6E" stroke-width="1.6"/><text x="655.0" y="344" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">BPF iterators</text><text x="655.0" y="364" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">walk kernel objects</text><text x="655.0" y="380" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">cat a process table</text><rect x="820" y="320" width="270" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#0066CC" stroke-width="1.6"/><text x="955.0" y="344" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">syscall progs</text><text x="955.0" y="364" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">light skeletons,</text><text x="955.0" y="380" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">loader programs</text><rect x="70" y="470" width="1140" height="70" rx="8" ry="8" fill="#F4F4F4" stroke="#D2D2D2" stroke-width="1"/><text x="92" y="500" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">Several of these are where Aya's kernel-side authoring is still emerging in 2026 — the reference</text><text x="92" y="522" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">implementations are C, loaded with bpftool, with an Aya observer alongside. We flag each honestly.</text></svg>