<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 600" width="1260" height="600"><defs><marker id="_arrow_neutral_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4A4A4A"/></marker></defs><rect x="0" y="0" width="1260" height="600" fill="#FFFFFF"/><text x="630.0" y="36" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="22" font-weight="bold" fill="#4A4A4A" text-anchor="middle">Where eBPF attaches: one technology, many hook points</text><text x="630.0" y="64" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="normal" fill="#5A5A5A" text-anchor="middle">The same load→verify→attach model, aimed at different kernel surfaces.</text><rect x="520" y="120" width="220" height="80" rx="8" ry="8" fill="#FFFFFF" stroke="#EE0000" stroke-width="1.6"/><text x="630.0" y="144" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">eBPF program</text><text x="630.0" y="164" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">verified + JITed</text><rect x="70" y="300" width="250" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#006E6E" stroke-width="1.6"/><text x="195.0" y="324" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Tracing</text><text x="195.0" y="344" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">tracepoints, kprobes,</text><text x="195.0" y="360" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">fentry/fexit, uprobes</text><text x="195.0" y="376" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">→ observe execution</text><rect x="360" y="300" width="250" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#0066CC" stroke-width="1.6"/><text x="485.0" y="324" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Networking</text><text x="485.0" y="344" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">XDP, tc/tcx,</text><text x="485.0" y="360" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">socket ops</text><text x="485.0" y="376" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">→ filter / redirect</text><rect x="650" y="300" width="250" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#B36B00" stroke-width="1.6"/><text x="775.0" y="324" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Security (LSM)</text><text x="775.0" y="344" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">bprm_check, file_open,</text><text x="775.0" y="360" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">task_kill</text><text x="775.0" y="376" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">→ allow / deny</text><rect x="940" y="300" width="250" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#6A1B9A" stroke-width="1.6"/><text x="1065.0" y="324" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Perf &amp; sched</text><text x="1065.0" y="344" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">perf events, sched_ext,</text><text x="1065.0" y="360" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">profiling</text><text x="1065.0" y="376" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">→ measure / schedule</text><line x1="560" y1="200" x2="195" y2="300" stroke="#4A4A4A" stroke-width="1.6" marker-end="url(#_arrow_neutral_0)"/><line x1="600" y1="200" x2="485" y2="300" stroke="#4A4A4A" stroke-width="1.6" marker-end="url(#_arrow_neutral_0)"/><line x1="660" y1="200" x2="775" y2="300" stroke="#4A4A4A" stroke-width="1.6" marker-end="url(#_arrow_neutral_0)"/><line x1="700" y1="200" x2="1065" y2="300" stroke="#4A4A4A" stroke-width="1.6" marker-end="url(#_arrow_neutral_0)"/><rect x="70" y="470" width="1120" height="60" rx="8" ry="8" fill="#F4F4F4" stroke="#D2D2D2" stroke-width="1"/><text x="92" y="505" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">Learn the model once; every chapter is a different hook and a different map — the shape is the same.</text></svg>