<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 560" width="1240" height="560"><defs><marker id="_arrow_neutral_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4A4A4A"/></marker><marker id="_arrow_govern_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#B36B00"/></marker><marker id="_arrow_platform_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#006E6E"/></marker><marker id="_arrow_danger_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#B71C1C"/></marker></defs><rect x="0" y="0" width="1240" height="560" fill="#FFFFFF"/><text x="620.0" y="36" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="22" font-weight="bold" fill="#4A4A4A" text-anchor="middle">Inside the verifier: why it accepts or rejects</text><text x="620.0" y="64" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="normal" fill="#5A5A5A" text-anchor="middle">Abstract interpretation over every path, with a complexity budget.</text><rect x="70" y="160" width="240" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#0066CC" stroke-width="1.6"/><text x="190.0" y="184" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Load request</text><text x="190.0" y="204" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">bytecode +</text><text x="190.0" y="220" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">map fds + BTF</text><rect x="400" y="120" width="240" height="90" rx="8" ry="8" fill="#FFFFFF" stroke="#B36B00" stroke-width="1.6"/><text x="520.0" y="144" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Walk every path</text><text x="520.0" y="164" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">track each register</text><text x="520.0" y="180" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">as a value range</text><rect x="400" y="250" width="240" height="90" rx="8" ry="8" fill="#FFFFFF" stroke="#B36B00" stroke-width="1.6"/><text x="520.0" y="274" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Prune equivalents</text><text x="520.0" y="294" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">state pruning keeps</text><text x="520.0" y="310" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">it from exploding</text><rect x="740" y="160" width="240" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#EE0000" stroke-width="1.6"/><text x="860.0" y="184" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Checks</text><text x="860.0" y="204" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">bounds on memory</text><text x="860.0" y="220" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">bounded loops</text><text x="860.0" y="236" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">no leaks to user</text><rect x="1040" y="120" width="160" height="80" rx="8" ry="8" fill="#FFFFFF" stroke="#006E6E" stroke-width="1.6"/><text x="1120.0" y="144" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">accept</text><text x="1120.0" y="164" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">-&gt; JIT</text><rect x="1040" y="250" width="160" height="80" rx="8" ry="8" fill="#FFFFFF" stroke="#B71C1C" stroke-width="1.6"/><text x="1120.0" y="274" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">reject</text><text x="1120.0" y="294" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">clear error</text><line x1="310" y1="215" x2="400" y2="175" stroke="#4A4A4A" stroke-width="1.6" marker-end="url(#_arrow_neutral_0)"/><line x1="640" y1="175" x2="740" y2="200" stroke="#B36B00" stroke-width="1.6" marker-end="url(#_arrow_govern_0)"/><line x1="640" y1="295" x2="740" y2="240" stroke="#B36B00" stroke-width="1.6" marker-end="url(#_arrow_govern_0)"/><line x1="980" y1="190" x2="1040" y2="165" stroke="#006E6E" stroke-width="1.6" marker-end="url(#_arrow_platform_0)"/><line x1="980" y1="240" x2="1040" y2="280" stroke="#B71C1C" stroke-width="1.6" marker-end="url(#_arrow_danger_0)"/><rect x="70" y="430" width="1130" height="60" rx="8" ry="8" fill="#F4F4F4" stroke="#D2D2D2" stroke-width="1"/><text x="92" y="465" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">Big programs hit the instruction-analysis budget — which is why you split logic across tail calls or helpers.</text></svg>