<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540"><defs><marker id="_arrow_rest_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#EE0000"/></marker><marker id="_arrow_svc_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0066CC"/></marker></defs><rect x="0" y="0" width="1200" height="540" fill="#FFFFFF"/><text x="600.0" y="36" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="22" font-weight="bold" fill="#4A4A4A" text-anchor="middle">Maps: the shared memory between kernel and user space</text><text x="600.0" y="64" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="normal" fill="#5A5A5A" text-anchor="middle">The program writes; the loader reads. No syscalls per event.</text><rect x="80" y="170" width="260" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#EE0000" stroke-width="1.6"/><text x="210.0" y="194" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">eBPF program</text><text x="210.0" y="214" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">runs in kernel</text><text x="210.0" y="230" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">EVENTS.output(&amp;e)</text><rect x="470" y="160" width="240" height="130" rx="8" ry="8" fill="#FFFFFF" stroke="#6A1B9A" stroke-width="1.6"/><text x="590.0" y="184" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">BPF map</text><text x="590.0" y="204" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">HashMap / Array /</text><text x="590.0" y="220" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">RingBuf / PerCpu</text><text x="590.0" y="236" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">lives in the kernel</text><rect x="850" y="170" width="260" height="110" rx="8" ry="8" fill="#FFFFFF" stroke="#0066CC" stroke-width="1.6"/><text x="980.0" y="194" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Loader</text><text x="980.0" y="214" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">user space</text><text x="980.0" y="230" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">map.read() / .next()</text><line x1="340" y1="220" x2="470" y2="220" stroke="#EE0000" stroke-width="1.6" marker-end="url(#_arrow_rest_0)"/><text x="405.0" y="214.0" font-family="Red Hat Text, Arial, sans-serif" font-size="11" fill="#5A5A5A" text-anchor="middle">write</text><line x1="850" y1="250" x2="710" y2="250" stroke="#0066CC" stroke-width="1.6" marker-end="url(#_arrow_svc_0)"/><text x="780.0" y="264.0" font-family="Red Hat Text, Arial, sans-serif" font-size="11" fill="#5A5A5A" text-anchor="middle">read</text><rect x="80" y="380" width="1030" height="80" rx="8" ry="8" fill="#F4F4F4" stroke="#D2D2D2" stroke-width="1"/><text x="102" y="408" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">Map choice is a design decision: per-CPU counters for cheap aggregation,</text><text x="102" y="430" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">ring buffers for ordered event streams, arrays for config the loader sets.</text></svg>