<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 540" width="1260" height="540"><defs><marker id="_arrow_rest_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#EE0000"/></marker><marker id="_arrow_svc_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0066CC"/></marker><marker id="_arrow_data_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6A1B9A"/></marker></defs><rect x="0" y="0" width="1260" height="540" fill="#FFFFFF"/><text x="630.0" y="36" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="22" font-weight="bold" fill="#4A4A4A" text-anchor="middle">From kernel event to Grafana panel</text><text x="630.0" y="64" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="normal" fill="#5A5A5A" text-anchor="middle">The loader is also an OTLP exporter; the LGTM stack does the rest.</text><rect x="70" y="180" width="220" height="100" rx="8" ry="8" fill="#FFFFFF" stroke="#EE0000" stroke-width="1.6"/><text x="180.0" y="204" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">eBPF + loader</text><text x="180.0" y="224" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">events / metrics</text><text x="180.0" y="240" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">on the VM</text><rect x="380" y="180" width="200" height="100" rx="8" ry="8" fill="#FFFFFF" stroke="#0066CC" stroke-width="1.6"/><text x="480.0" y="204" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">OTLP export</text><text x="480.0" y="224" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">OTLP/HTTP :4318</text><text x="480.0" y="240" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">from the loader</text><rect x="670" y="150" width="230" height="160" rx="8" ry="8" fill="#FFFFFF" stroke="#6A1B9A" stroke-width="1.6"/><text x="785.0" y="174" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">LGTM stack</text><text x="785.0" y="194" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">Loki · logs</text><text x="785.0" y="210" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">Grafana · dashboards</text><text x="785.0" y="226" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">Tempo · traces</text><text x="785.0" y="242" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">Mimir/Prom · metrics</text><rect x="990" y="180" width="200" height="100" rx="8" ry="8" fill="#FFFFFF" stroke="#006E6E" stroke-width="1.6"/><text x="1090.0" y="204" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Grafana</text><text x="1090.0" y="224" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">one pane:</text><text x="1090.0" y="240" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">kernel truth, graphed</text><line x1="290" y1="230" x2="380" y2="230" stroke="#EE0000" stroke-width="1.6" marker-end="url(#_arrow_rest_0)"/><line x1="580" y1="230" x2="670" y2="230" stroke="#0066CC" stroke-width="1.6" marker-end="url(#_arrow_svc_0)"/><text x="625.0" y="224.0" font-family="Red Hat Text, Arial, sans-serif" font-size="11" fill="#5A5A5A" text-anchor="middle">OTLP</text><line x1="900" y1="230" x2="990" y2="230" stroke="#6A1B9A" stroke-width="1.6" marker-end="url(#_arrow_data_0)"/><rect x="70" y="400" width="1120" height="60" rx="8" ry="8" fill="#F4F4F4" stroke="#D2D2D2" stroke-width="1"/><text x="92" y="435" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">No agent in the target, no code change in the app: the signal comes from the kernel, uniformly.</text></svg>