<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" width="1280" height="560"><defs><marker id="_arrow_svc_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0066CC"/></marker><marker id="_arrow_neutral_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4A4A4A"/></marker><marker id="_arrow_data_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6A1B9A"/></marker></defs><rect x="0" y="0" width="1280" height="560" fill="#FFFFFF"/><text x="640.0" y="36" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="22" font-weight="bold" fill="#4A4A4A" text-anchor="middle">Correlating kernel events with distributed traces</text><text x="640.0" y="64" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="normal" fill="#5A5A5A" text-anchor="middle">The traceparent flows through the app; eBPF ties kernel spans to it.</text><rect x="70" y="170" width="220" height="100" rx="8" ry="8" fill="#FFFFFF" stroke="#0066CC" stroke-width="1.6"/><text x="180.0" y="194" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Service A</text><text x="180.0" y="214" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">starts a trace</text><text x="180.0" y="230" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">W3C traceparent</text><rect x="380" y="170" width="220" height="100" rx="8" ry="8" fill="#FFFFFF" stroke="#0066CC" stroke-width="1.6"/><text x="490.0" y="194" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Service B</text><text x="490.0" y="214" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">propagates it</text><text x="490.0" y="230" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">HTTP header</text><rect x="690" y="170" width="240" height="100" rx="8" ry="8" fill="#FFFFFF" stroke="#EE0000" stroke-width="1.6"/><text x="810.0" y="194" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">eBPF probes</text><text x="810.0" y="214" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">see the syscall/query</text><text x="810.0" y="230" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">tag with trace id</text><rect x="1010" y="170" width="200" height="100" rx="8" ry="8" fill="#FFFFFF" stroke="#6A1B9A" stroke-width="1.6"/><text x="1110.0" y="194" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Tempo</text><text x="1110.0" y="214" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">one trace,</text><text x="1110.0" y="230" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">kernel + app spans</text><line x1="290" y1="220" x2="380" y2="220" stroke="#0066CC" stroke-width="1.6" marker-end="url(#_arrow_svc_0)"/><text x="335.0" y="214.0" font-family="Red Hat Text, Arial, sans-serif" font-size="11" fill="#5A5A5A" text-anchor="middle">traceparent</text><line x1="600" y1="220" x2="690" y2="220" stroke="#4A4A4A" stroke-width="1.6" marker-end="url(#_arrow_neutral_0)"/><line x1="930" y1="220" x2="1010" y2="220" stroke="#6A1B9A" stroke-width="1.6" marker-end="url(#_arrow_data_0)"/><rect x="70" y="360" width="1140" height="80" rx="8" ry="8" fill="#F4F4F4" stroke="#D2D2D2" stroke-width="1"/><text x="92" y="390" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">The three signals — metrics (Mimir), logs (Loki), traces (Tempo) — join on the trace id, so a slow</text><text x="92" y="412" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">request in Grafana links to the exact kernel-level latency eBPF measured underneath it.</text></svg>