<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 540" width="1240" height="540"><defs><marker id="_arrow_platform_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#006E6E"/></marker><marker id="_arrow_svc_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0066CC"/></marker><marker id="_arrow_danger_0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#B71C1C"/></marker></defs><rect x="0" y="0" width="1240" height="540" fill="#FFFFFF"/><text x="620.0" y="36" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="22" font-weight="bold" fill="#4A4A4A" text-anchor="middle">XDP: a decision at the earliest possible point</text><text x="620.0" y="64" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="normal" fill="#5A5A5A" text-anchor="middle">Runs in the driver, before an skb is even allocated.</text><rect x="70" y="190" width="180" height="90" rx="8" ry="8" fill="#FFFFFF" stroke="#006E6E" stroke-width="1.6"/><text x="160.0" y="214" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">NIC</text><text x="160.0" y="234" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">packet arrives</text><rect x="330" y="190" width="210" height="90" rx="8" ry="8" fill="#FFFFFF" stroke="#EE0000" stroke-width="1.6"/><text x="435.0" y="214" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">XDP program</text><text x="435.0" y="234" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">inspect headers</text><text x="435.0" y="250" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">return an action</text><rect x="640" y="110" width="200" height="80" rx="8" ry="8" fill="#FFFFFF" stroke="#0066CC" stroke-width="1.6"/><text x="740.0" y="134" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">XDP_PASS</text><text x="740.0" y="154" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">→ up the stack</text><rect x="640" y="230" width="200" height="80" rx="8" ry="8" fill="#FFFFFF" stroke="#B71C1C" stroke-width="1.6"/><text x="740.0" y="254" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">XDP_DROP</text><text x="740.0" y="274" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">→ gone, no cost</text><rect x="950" y="110" width="210" height="80" rx="8" ry="8" fill="#FFFFFF" stroke="#0066CC" stroke-width="1.6"/><text x="1055.0" y="134" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A4A4A" text-anchor="middle">Network stack</text><text x="1055.0" y="154" font-family="Red Hat Text, Arial, sans-serif" font-size="12" fill="#5A5A5A" text-anchor="middle">sockets, apps</text><line x1="250" y1="235" x2="330" y2="235" stroke="#006E6E" stroke-width="1.6" marker-end="url(#_arrow_platform_0)"/><line x1="540" y1="215" x2="640" y2="160" stroke="#0066CC" stroke-width="1.6" marker-end="url(#_arrow_svc_0)"/><line x1="540" y1="255" x2="640" y2="270" stroke="#B71C1C" stroke-width="1.6" marker-end="url(#_arrow_danger_0)"/><line x1="840" y1="150" x2="950" y2="150" stroke="#0066CC" stroke-width="1.6" marker-end="url(#_arrow_svc_0)"/><rect x="70" y="400" width="1090" height="70" rx="8" ry="8" fill="#F4F4F4" stroke="#D2D2D2" stroke-width="1"/><text x="92" y="430" font-family="Overpass, Red Hat Text, Arial, sans-serif" font-size="13" font-weight="normal" fill="#4A4A4A" text-anchor="start">Dropping a flood at XDP costs a few instructions per packet — the packet never touches the stack.</text></svg>