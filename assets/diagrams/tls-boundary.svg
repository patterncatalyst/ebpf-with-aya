<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="30" y="120" width="120" height="60" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="90.0" y="148.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">app</text>
<text x="90.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">plaintext</text>
<rect x="180" y="120" width="150" height="60" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="255.0" y="148.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">SSL_write(buf)</text>
<text x="255.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">plaintext @ entry</text>
<rect x="360" y="120" width="190" height="60" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="455.0" y="148.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">TLS record on the wire</text>
<text x="455.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">ciphertext</text>
<rect x="580" y="120" width="150" height="60" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="655.0" y="148.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">SSL_read(buf)</text>
<text x="655.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">plaintext @ return</text>
<rect x="760" y="120" width="110" height="60" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="815.0" y="148.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">peer app</text>
<text x="815.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">plaintext</text>
<rect x="360" y="30" width="190" height="50" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="455.0" y="53.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">sslsniff (uprobes)</text>
<text x="455.0" y="70.0" font-size="11.5" fill="#555555" text-anchor="middle">captures plaintext</text>
<text x="450" y="285" font-size="11" fill="#888" text-anchor="middle">the wire is encrypted — the plaintext is at SSL_write&#x27;s buffer on entry and SSL_read&#x27;s on return</text>
<path d="M150,150 L180,150" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M330,150 L360,150" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="323.0" y="144.0" font-size="11" fill="#555">encrypt</text>
<path d="M550,150 L580,150" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="543.0" y="144.0" font-size="11" fill="#555">decrypt</text>
<path d="M730,150 L760,150" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M255,120 L430,80" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M655,120 L490,80" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
</svg>