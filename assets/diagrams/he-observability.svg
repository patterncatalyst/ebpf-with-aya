<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="34" y="86" width="310" height="218" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="189.0" y="140.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">HE workload — TFHE-rs (Rust)</text>
<text x="189.0" y="157.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="189.0" y="172.5" font-size="11.5" fill="#555555" text-anchor="middle">he_keygen()</text>
<text x="189.0" y="187.5" font-size="11.5" fill="#555555" text-anchor="middle">he_encrypt()   → ciphertext</text>
<text x="189.0" y="202.5" font-size="11.5" fill="#555555" text-anchor="middle">he_add()   ⊕ on ciphertext</text>
<text x="189.0" y="217.5" font-size="11.5" fill="#555555" text-anchor="middle">he_compute()   ⊗ on ciphertext</text>
<text x="189.0" y="232.5" font-size="11.5" fill="#555555" text-anchor="middle">he_decrypt()</text>
<text x="189.0" y="247.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="189.0" y="262.5" font-size="11.5" fill="#555555" text-anchor="middle">operands stay encrypted</text>
<rect x="408" y="132" width="236" height="120" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="526.0" y="175.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">eBPF / Aya</text>
<text x="526.0" y="192.0" font-size="11.5" fill="#555555" text-anchor="middle">uprobe + uretprobe</text>
<text x="526.0" y="207.0" font-size="11.5" fill="#555555" text-anchor="middle">on each he_* boundary</text>
<text x="526.0" y="222.0" font-size="11.5" fill="#555555" text-anchor="middle">entry→return = duration</text>
<rect x="704" y="140" width="226" height="108" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="817.0" y="177.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">ebpf_he_op_latency_seconds</text>
<text x="817.0" y="194.0" font-size="11.5" fill="#555555" text-anchor="middle">{op = keygen | encrypt</text>
<text x="817.0" y="209.0" font-size="11.5" fill="#555555" text-anchor="middle">| add | compute | decrypt}</text>
<text x="817.0" y="224.0" font-size="11.5" fill="#555555" text-anchor="middle">→ Grafana</text>
<path d="M344,190 L408,190" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="378.0" y="182.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">attach by symbol</text>
<text x="378.0" y="182.0" font-size="11" fill="#b8650a" text-anchor="middle">attach by symbol</text>
<path d="M644,192 L704,192" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="674.0" y="184.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">histogram per op</text>
<text x="674.0" y="184.0" font-size="11" fill="#b8650a" text-anchor="middle">histogram per op</text>
<text x="480" y="34" font-size="15" fill="#b8650a" text-anchor="middle" font-weight="700">observe a privacy-preserving workload: time the operations, never the data</text>
<text x="480" y="338" font-size="12" fill="#1d1d1d" text-anchor="middle">extends the Ch 63 capstone — same uprobe + OTel machinery, on a workload you deliberately cannot read: eBPF measures duration &amp; stacks, not values</text>
</svg>