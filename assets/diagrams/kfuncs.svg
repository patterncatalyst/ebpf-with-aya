<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="214" width="800" height="118" rx="12" fill="#fff8ef" stroke="#ddd"/>
<text x="52" y="234" font-size="12" font-weight="700" fill="#888">the acquire / release discipline (verifier-enforced)</text>
<rect x="40" y="68" width="360" height="110" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="220.0" y="113.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">BPF helpers</text>
<text x="220.0" y="130.5" font-size="11.5" fill="#555555" text-anchor="middle">a frozen, numbered UAPI list (~210)</text>
<text x="220.0" y="145.5" font-size="11.5" fill="#555555" text-anchor="middle">stable ABI · scalar &amp; memory args</text>
<rect x="480" y="68" width="360" height="110" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="660.0" y="113.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">kfuncs</text>
<text x="660.0" y="130.5" font-size="11.5" fill="#555555" text-anchor="middle">kernel functions registered via BTF</text>
<text x="660.0" y="145.5" font-size="11.5" fill="#555555" text-anchor="middle">typed kernel pointers · per-fn flags · no ABI stability</text>
<rect x="70" y="262" width="210" height="52" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="175.0" y="286.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">bpf_task_from_pid()</text>
<text x="175.0" y="303.0" font-size="11.5" fill="#555555" text-anchor="middle">KF_ACQUIRE | KF_RET_NULL</text>
<rect x="330" y="268" width="150" height="42" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="405.0" y="287.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">null-check</text>
<text x="405.0" y="304.0" font-size="11.5" fill="#555555" text-anchor="middle">(forced)</text>
<rect x="540" y="262" width="210" height="52" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="645.0" y="286.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">bpf_task_release()</text>
<text x="645.0" y="303.0" font-size="11.5" fill="#555555" text-anchor="middle">KF_RELEASE</text>
<path d="M280,288 L330,289" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M480,289 L540,288" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="510.0" y="280.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">must release</text>
<text x="510.0" y="280.5" font-size="11" fill="#b8650a" text-anchor="middle">must release</text>
<text x="440" y="30" font-size="11" fill="#b8650a" text-anchor="middle" font-weight="700">two ways to call into the kernel from BPF</text>
<text x="220" y="196" font-size="13" fill="#6a6a6a" text-anchor="middle">adding one is a permanent ABI commitment</text>
<text x="660" y="196" font-size="13" fill="#b8650a" text-anchor="middle">subsystems export their own; expect churn</text>
<text x="440" y="348" font-size="11" fill="#888" text-anchor="middle">drop the release on any path and the program won&#x27;t load — kfuncs let the verifier enforce reference safety</text>
</svg>