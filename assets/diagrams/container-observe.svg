<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="40" width="860" height="280" rx="12" fill="#f7f7f7" stroke="#ddd"/>
<text x="32" y="60" font-size="12" font-weight="700" fill="#888">target VM — one shared kernel</text>
<rect x="60" y="90" width="300" height="150" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="210.0" y="163.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">container (crun)</text>
<text x="210.0" y="180.0" font-size="11.5" fill="#555555" text-anchor="middle">own PID + mount namespaces</text>
<rect x="80" y="150" width="120" height="64" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="140.0" y="180.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Quarkus /</text>
<text x="140.0" y="197.0" font-size="11.5" fill="#555555" text-anchor="middle">FastAPI</text>
<rect x="220" y="150" width="120" height="64" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="280.0" y="180.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">libjvm.so</text>
<text x="280.0" y="197.0" font-size="11.5" fill="#555555" text-anchor="middle">overlay fs</text>
<rect x="520" y="110" width="210" height="70" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="625.0" y="143.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">your eBPF</text>
<text x="625.0" y="160.0" font-size="11.5" fill="#555555" text-anchor="middle">sees HOST pids</text>
<rect x="520" y="215" width="210" height="60" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="625.0" y="243.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">filter by cgroup id</text>
<text x="625.0" y="260.0" font-size="11.5" fill="#555555" text-anchor="middle">bpf_get_current_cgroup_id</text>
<text x="450" y="308" font-size="11" fill="#888" text-anchor="middle">the kernel sees every container&#x27;s processes; scope to one by cgroup, translate host ↔ in-container PIDs</text>
<path d="M520,150 L345,182" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="282.5" y="160.0" font-size="11" fill="#b8650a">attach by host PID / overlay path</text>
<path d="M625,215 L625,180" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="633.0" y="199.5" font-size="11" fill="#555">scope to one</text>
</svg>