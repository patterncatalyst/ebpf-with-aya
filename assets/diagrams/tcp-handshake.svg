<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="150" width="860" height="110" rx="12" fill="#fafafa" stroke="#ddd"/>
<path d="M190,200 L680,190" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="315.0" y="189.0" font-size="11" fill="#555">SYN →</text>
<path d="M680,225 L190,235" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="475.0" y="246.0" font-size="11" fill="#555">← SYN-ACK</text>
<path d="M140,124 L140,185" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<path d="M730,124 L300,205" fill="none" stroke="#b8650a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#am)"/>
<text x="635.0" y="160.5" font-size="11" fill="#b8650a">established</text>
<rect x="40" y="60" width="200" height="64" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="140.0" y="90.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">kprobe tcp_v4_connect</text>
<text x="140.0" y="107.0" font-size="11.5" fill="#555555" text-anchor="middle">stamp t0, key = sock*</text>
<rect x="620" y="60" width="220" height="64" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="730.0" y="90.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">kprobe tcp_rcv_state_process</text>
<text x="730.0" y="107.0" font-size="11.5" fill="#555555" text-anchor="middle">Δ = now − t0 → emit</text>
<rect x="40" y="185" width="150" height="56" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="115.0" y="211.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">client</text>
<text x="115.0" y="228.0" font-size="11.5" fill="#555555" text-anchor="middle">connect()</text>
<rect x="680" y="185" width="150" height="56" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="755.0" y="211.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">server (peer VM)</text>
<text x="755.0" y="228.0" font-size="11.5" fill="#555555" text-anchor="middle">listening</text>
<text x="440" y="40" font-size="11" fill="#b8650a" text-anchor="middle" font-weight="700">connection latency = connect() → SYN-ACK received</text>
<text x="440" y="288" font-size="11" fill="#888" text-anchor="middle">keyed by the struct sock* across two kprobes; sock fields read by offset (CO-RE in Ch 56)</text>
</svg>