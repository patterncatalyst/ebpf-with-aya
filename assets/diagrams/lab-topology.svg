<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" font-family="'Red Hat Text', system-ui, sans-serif" role="img" aria-label="Lab topology: a Fedora 44 host laptop running Podman containers and the Aya build, a target KVM VM where eBPF loads, and a peer KVM VM for two-host networking tests">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
  <rect x="18" y="40" width="404" height="430" rx="14" fill="#fff8ef" stroke="#111" stroke-width="2"/>
  <text x="38" y="68" font-size="17" font-weight="700" fill="#111">Host — Fedora 44 laptop</text>
  <text x="38" y="86" font-size="12" fill="#666">builds, clients, stack · kernel never the eBPF target</text>

  <rect x="38" y="100" width="364" height="56" rx="9" fill="#fff" stroke="#999"/>
  <text x="52" y="126" font-size="13.5" font-weight="600" fill="#111">RustRover · cargo build</text>
  <text x="52" y="144" font-size="11.5" fill="#666">compiles Aya program → one self-contained binary</text>

  <rect x="38" y="170" width="364" height="284" rx="9" fill="#fff" stroke="#e8870c" stroke-width="1.5"/>
  <text x="52" y="194" font-size="13.5" font-weight="700" fill="#b8650a">Podman (rootless) — all user space in containers</text>

  <rect x="54" y="208" width="332" height="58" rx="8" fill="#fff8ef" stroke="#e8870c"/>
  <text x="68" y="232" font-size="13" font-weight="600" fill="#111">otel-lgtm stack</text>
  <text x="68" y="250" font-size="11.5" fill="#666">Grafana :3000 · Tempo · Mimir · Loki · OTLP :4318</text>

  <rect x="54" y="278" width="332" height="50" rx="8" fill="#fff8ef" stroke="#e8870c"/>
  <text x="68" y="300" font-size="13" font-weight="600" fill="#111">Python 3.14 clients</text>
  <text x="68" y="317" font-size="11.5" fill="#666">load drivers (UBI, multi-stage)</text>

  <rect x="54" y="340" width="332" height="56" rx="8" fill="#fff8ef" stroke="#e8870c"/>
  <text x="68" y="362" font-size="13" font-weight="600" fill="#111">app targets to observe</text>
  <text x="68" y="380" font-size="11.5" fill="#666">Java 25 + Quarkus 3.33 · Python 3.14 + FastAPI</text>

  <text x="54" y="430" font-size="11" fill="#888">containers via crun 1.27.1 · ports on 127.0.0.1 · :Z mounts</text>

  <!-- ===== Target VM ===== -->
  <rect x="500" y="40" width="362" height="196" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="520" y="68" font-size="17" font-weight="700" fill="#111">Target VM — ebpf-target</text>
  <text x="520" y="86" font-size="12" fill="#666">Fedora 44 under KVM · disposable</text>

  <rect x="520" y="100" width="322" height="48" rx="8" fill="#fff8ef" stroke="#e8870c"/>
  <text x="534" y="121" font-size="13" font-weight="600" fill="#111">Aya loader (binary, sudo)</text>
  <text x="534" y="138" font-size="11.5" fill="#666">the one user-space piece NOT in a container</text>

  <rect x="520" y="158" width="322" height="60" rx="8" fill="#f4f4f4" stroke="#999"/>
  <text x="534" y="180" font-size="13" font-weight="600" fill="#111">kernel + eBPF + BTF</text>
  <text x="534" y="198" font-size="11.5" fill="#666">programs load &amp; attach here (never the laptop)</text>

  <!-- ===== Peer VM ===== -->
  <rect x="500" y="300" width="362" height="150" rx="14" fill="#fff" stroke="#111" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="520" y="328" font-size="17" font-weight="700" fill="#111">Peer VM — ebpf-peer</text>
  <text x="520" y="346" font-size="12" fill="#666">optional · for two-host networking tests</text>
  <rect x="520" y="360" width="322" height="62" rx="8" fill="#f4f4f4" stroke="#999"/>
  <text x="534" y="384" font-size="13" font-weight="600" fill="#111">client / server endpoint</text>
  <text x="534" y="402" font-size="11.5" fill="#666">XDP · TC · tcpconnlat traffic over libvirt net</text>

  <!-- ===== Arrows ===== -->
  <!-- host build -> target loader -->
  <path d="M422,128 L500,124" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="116" font-size="11" fill="#555">scp + ssh sudo run</text>

  <!-- target -> host stack (OTLP) -->
  <path d="M500,196 C460,210 446,228 402,236" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <text x="416" y="220" font-size="11" fill="#b8650a">OTLP → :4318</text>

  <!-- target <-> peer -->
  <path d="M681,236 L681,300" fill="none" stroke="#555" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="690" y="272" font-size="11" fill="#555">test traffic</text>
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/>
    </marker>
  </defs>

  <!-- ===== Host laptop ===== -->
</svg>
