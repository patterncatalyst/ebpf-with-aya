<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 330" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="34" y="98" width="250" height="150" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="159.0" y="156.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">1 — Pinning (lifetime)</text>
<text x="159.0" y="173.0" font-size="11.5" fill="#555555" text-anchor="middle">pin prog / link / map to bpffs</text>
<text x="159.0" y="188.0" font-size="11.5" fill="#555555" text-anchor="middle">they outlive the loader process</text>
<text x="159.0" y="203.0" font-size="11.5" fill="#555555" text-anchor="middle">a new loader re-acquires by path</text>
<rect x="312" y="98" width="256" height="150" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="440.0" y="156.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">2 — Link update (zero-downtime)</text>
<text x="440.0" y="173.0" font-size="11.5" fill="#555555" text-anchor="middle">BPF_LINK_UPDATE swaps the</text>
<text x="440.0" y="188.0" font-size="11.5" fill="#555555" text-anchor="middle">program under a LIVE link</text>
<text x="440.0" y="203.0" font-size="11.5" fill="#555555" text-anchor="middle">no gap — no dropped packets/events</text>
<rect x="596" y="98" width="250" height="150" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="721.0" y="156.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">3 — Pinned maps (state)</text>
<text x="721.0" y="173.0" font-size="11.5" fill="#555555" text-anchor="middle">reuse the same map across versions</text>
<text x="721.0" y="188.0" font-size="11.5" fill="#555555" text-anchor="middle">counters &amp; connection state</text>
<text x="721.0" y="203.0" font-size="11.5" fill="#555555" text-anchor="middle">survive the upgrade</text>
<path d="M284,150 L312,150" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M568,150 L596,150" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="440" y="34" font-size="11" fill="#b8650a" text-anchor="middle" font-weight="700">operating eBPF: outlive the process, swap without a gap, keep the state</text>
<text x="440" y="290" font-size="11" fill="#888" text-anchor="middle">by hand: a systemd unit pins, a deploy script updates the link</text>
<text x="440" y="312" font-size="11" fill="#888" text-anchor="middle">at fleet scale: L3AF (LF Networking) and bpfman (CNCF) productize exactly these three pillars</text>
</svg>