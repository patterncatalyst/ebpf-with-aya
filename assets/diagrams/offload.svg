<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 350" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="28" y="118" width="118" height="56" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="87.0" y="144.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">packets</text>
<text x="87.0" y="161.0" font-size="11.5" fill="#555555" text-anchor="middle">(the wire)</text>
<rect x="196" y="92" width="242" height="118" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="317.0" y="134.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">NIC / DPU</text>
<text x="317.0" y="151.0" font-size="11.5" fill="#555555" text-anchor="middle">offloaded eBPF runs HERE</text>
<text x="317.0" y="166.0" font-size="11.5" fill="#555555" text-anchor="middle">— off the host CPU</text>
<text x="317.0" y="181.0" font-size="11.5" fill="#555555" text-anchor="middle">drop/redirect before host</text>
<rect x="494" y="108" width="236" height="92" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="612.0" y="144.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">host CPU (kernel)</text>
<text x="612.0" y="161.5" font-size="11.5" fill="#555555" text-anchor="middle">native/generic XDP here</text>
<text x="612.0" y="176.5" font-size="11.5" fill="#555555" text-anchor="middle">sees only what the NIC passes</text>
<rect x="28" y="256" width="206" height="66" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="131.0" y="279.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">SmartNIC flow processor</text>
<text x="131.0" y="296.5" font-size="11.5" fill="#555555" text-anchor="middle">JIT eBPF → NIC machine code</text>
<text x="131.0" y="311.5" font-size="11.5" fill="#555555" text-anchor="middle">(Netronome / Corigine NFP)</text>
<rect x="246" y="256" width="200" height="66" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="346.0" y="279.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">DPU (ARM Linux)</text>
<text x="346.0" y="296.5" font-size="11.5" fill="#555555" text-anchor="middle">ordinary eBPF on the DPU</text>
<text x="346.0" y="311.5" font-size="11.5" fill="#555555" text-anchor="middle">— Aya runs unchanged</text>
<rect x="458" y="256" width="188" height="66" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="552.0" y="279.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">FPGA synthesis</text>
<text x="552.0" y="296.5" font-size="11.5" fill="#555555" text-anchor="middle">hXDP / eHDL</text>
<text x="552.0" y="311.5" font-size="11.5" fill="#555555" text-anchor="middle">(research)</text>
<rect x="658" y="256" width="192" height="66" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="754.0" y="279.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">GPU / Tensor cores</text>
<text x="754.0" y="296.5" font-size="11.5" fill="#555555" text-anchor="middle">ML inference on telemetry</text>
<text x="754.0" y="311.5" font-size="11.5" fill="#555555" text-anchor="middle">(NVIDIA Morpheus)</text>
<path d="M146,146 L196,146" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="171.0" y="138.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">arrive</text>
<text x="171.0" y="138.0" font-size="11" fill="#555" text-anchor="middle">arrive</text>
<path d="M438,150 L494,150" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="466.0" y="142.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">only some</text>
<text x="466.0" y="142.0" font-size="11" fill="#b8650a" text-anchor="middle">only some</text>
<text x="440" y="30" font-size="11" fill="#b8650a" text-anchor="middle" font-weight="700">offload: run the program somewhere other than the host CPU</text>
<text x="440" y="242" font-size="11" fill="#888" text-anchor="middle" font-weight="700">where “somewhere” can be:</text>
<text x="440" y="338" font-size="11" fill="#888" text-anchor="middle">true HW offload is narrow (NFP); the practical 2026 answer is eBPF on a DPU&#x27;s Linux; FPGA/GPU are the frontier</text>
</svg>