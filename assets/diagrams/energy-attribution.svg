<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 270" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="105" width="210" height="70" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="145.0" y="138.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">system power</text>
<text x="145.0" y="155.0" font-size="11.5" fill="#555555" text-anchor="middle">RAPL, or TDP model on a VM</text>
<rect x="320" y="105" width="210" height="70" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="425.0" y="138.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">× each task&#x27;s</text>
<text x="425.0" y="155.0" font-size="11.5" fill="#555555" text-anchor="middle">CPU-time share</text>
<rect x="600" y="105" width="230" height="70" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="715.0" y="138.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">estimated_power_watts{comm}</text>
<text x="715.0" y="155.0" font-size="11.5" fill="#555555" text-anchor="middle">per process / container</text>
<text x="430" y="45" font-size="11" fill="#b8650a" text-anchor="middle" font-weight="700">per-process energy is an attribution model, not a measurement</text>
<text x="430" y="225" font-size="11" fill="#888" text-anchor="middle">CPU-time share (portable) → cycles/counters (bare metal, more accurate)</text>
<path d="M250,140 L320,140" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M530,140 L600,140" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
</svg>