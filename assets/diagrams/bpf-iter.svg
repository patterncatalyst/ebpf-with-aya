<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="30" y="86" width="210" height="118" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="135.0" y="128.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">a kernel set</text>
<text x="135.0" y="145.0" font-size="11.5" fill="#555555" text-anchor="middle">all tasks</text>
<text x="135.0" y="160.0" font-size="11.5" fill="#555555" text-anchor="middle">all TCP sockets</text>
<text x="135.0" y="175.0" font-size="11.5" fill="#555555" text-anchor="middle">all map elements</text>
<rect x="312" y="98" width="214" height="94" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="419.0" y="135.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">BPF iterator program</text>
<text x="419.0" y="152.5" font-size="11.5" fill="#555555" text-anchor="middle">runs once per element</text>
<text x="419.0" y="167.5" font-size="11.5" fill="#555555" text-anchor="middle">BPF_SEQ_PRINTF(...)</text>
<rect x="596" y="102" width="256" height="86" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="724.0" y="135.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">seq_file output</text>
<text x="724.0" y="152.5" font-size="11.5" fill="#555555" text-anchor="middle">cat /sys/fs/bpf/task_iter</text>
<text x="724.0" y="167.5" font-size="11.5" fill="#555555" text-anchor="middle">(or read() the link fd)</text>
<path d="M240,145 L312,145" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="276.0" y="137.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">one call per element</text>
<text x="276.0" y="137.0" font-size="11" fill="#b8650a" text-anchor="middle">one call per element</text>
<path d="M526,145 L596,145" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="561.0" y="137.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">emits text</text>
<text x="561.0" y="137.0" font-size="11" fill="#b8650a" text-anchor="middle">emits text</text>
<text x="440" y="28" font-size="11" fill="#b8650a" text-anchor="middle" font-weight="700">iterators flip the model: the kernel calls your program for every element of a set</text>
<text x="440" y="286" font-size="11" fill="#888" text-anchor="middle">open-coded iterators (bpf_for / KF_ITER kfuncs) put bounded loops inside any BPF program</text>
</svg>