<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="30" y="95" width="170" height="70" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="115.0" y="128.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">perf_event timer</text>
<text x="115.0" y="145.0" font-size="11.5" fill="#555555" text-anchor="middle">99 Hz × every CPU</text>
<rect x="230" y="95" width="180" height="70" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="320.0" y="128.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">on each tick</text>
<text x="320.0" y="145.0" font-size="11.5" fill="#555555" text-anchor="middle">bpf_get_stackid()</text>
<rect x="450" y="95" width="170" height="70" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="535.0" y="128.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">StackTrace map</text>
<text x="535.0" y="145.0" font-size="11.5" fill="#555555" text-anchor="middle">dedups stacks</text>
<rect x="660" y="95" width="200" height="70" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="760.0" y="128.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">fold + symbolize</text>
<text x="760.0" y="145.0" font-size="11.5" fill="#555555" text-anchor="middle">flame graph / Pyroscope</text>
<text x="440" y="40" font-size="11" fill="#b8650a" text-anchor="middle" font-weight="700">sampling: fixed cost (99/s/CPU) no matter how busy the box is</text>
<text x="440" y="215" font-size="11" fill="#888" text-anchor="middle">kernel frames via /proc/kallsyms; user frames via a symbolizer (blazesym)</text>
<path d="M200,130 L230,130" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="201.0" y="126.0" font-size="11" fill="#555">fire</text>
<path d="M410,130 L450,130" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="404.0" y="126.0" font-size="11" fill="#555">capture</text>
<path d="M620,130 L660,130" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
