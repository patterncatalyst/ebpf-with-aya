<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="60" width="210" height="64" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="145.0" y="90.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">malloc(size)</text>
<text x="145.0" y="107.0" font-size="11.5" fill="#555555" text-anchor="middle">entry: stash · return: record</text>
<rect x="330" y="60" width="250" height="64" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="455.0" y="90.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">ALLOCS[ptr] = {size, stack}</text>
<text x="455.0" y="107.0" font-size="11.5" fill="#555555" text-anchor="middle">+ bpf_get_stackid (call site)</text>
<rect x="40" y="195" width="210" height="64" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="145.0" y="225.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">free(ptr)</text>
<text x="145.0" y="242.0" font-size="11.5" fill="#555555" text-anchor="middle">remove ALLOCS[ptr]</text>
<rect x="620" y="120" width="240" height="70" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="740.0" y="153.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">whatever&#x27;s left = leak</text>
<text x="740.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">grouped by alloc stack</text>
<text x="440" y="288" font-size="11" fill="#888" text-anchor="middle">the captured stack names the code that leaked — that&#x27;s what makes it actionable</text>
<path d="M250,92 L330,92" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="268.0" y="86.0" font-size="11" fill="#555">insert</text>
<path d="M250,227 L380,124" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="305.0" y="193.5" font-size="11" fill="#555">delete</text>
<path d="M580,110 L620,145" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="530.0" y="123.5" font-size="11" fill="#b8650a">outstanding</text>
