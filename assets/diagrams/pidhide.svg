<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="120" width="180" height="64" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="130.0" y="150.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">getdents64</text>
<text x="130.0" y="167.0" font-size="11.5" fill="#555555" text-anchor="middle">writes dir entries</text>
<rect x="290" y="108" width="250" height="88" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="415.0" y="142.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">eBPF exit hook</text>
<text x="415.0" y="159.5" font-size="11.5" fill="#555555" text-anchor="middle">bpf_probe_write_user</text>
<text x="415.0" y="174.5" font-size="11.5" fill="#555555" text-anchor="middle">splices out /proc/&lt;pid&gt;</text>
<rect x="620" y="120" width="220" height="64" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="730.0" y="150.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">ps / ls /proc</text>
<text x="730.0" y="167.0" font-size="11.5" fill="#555555" text-anchor="middle">the entry is gone</text>
<path d="M220,152 L290,152" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="255.0" y="144.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">user buffer</text>
<text x="255.0" y="144.0" font-size="11" fill="#555" text-anchor="middle">user buffer</text>
<path d="M540,152 L620,152" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="580.0" y="144.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">rewritten</text>
<text x="580.0" y="144.0" font-size="11" fill="#b8650a" text-anchor="middle">rewritten</text>
<text x="440" y="34" font-size="11" fill="#b8650a" text-anchor="middle" font-weight="700">the process still exists — it is edited out of what userspace is allowed to see</text>
<text x="440" y="286" font-size="11" fill="#888" text-anchor="middle">DEFENSE: bpf_probe_write_user taints the kernel; compare /proc against the real task list</text>
</svg>