<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="118" width="230" height="80" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="155.0" y="156.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">synthetic packet (bytes)</text>
<text x="155.0" y="173.0" font-size="11.5" fill="#555555" text-anchor="middle">Eth + IPv4 + ICMP/TCP</text>
<rect x="330" y="108" width="220" height="100" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="440.0" y="156.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">BPF_PROG_TEST_RUN</text>
