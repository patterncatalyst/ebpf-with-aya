<text x="725.0" y="193.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">+ map side-effects</text>
<text x="725.0" y="210.0" font-size="11.5" fill="#555555" text-anchor="middle">output buffer · duration</text>
<path d="M270,158 L330,158" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="300.0" y="150.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">data_in</text>
<text x="300.0" y="150.0" font-size="11" fill="#555" text-anchor="middle">data_in</text>
<path d="M550,140 L610,107" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="584.0" y="117.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">retval</text>
