<rect x="610" y="78" width="230" height="58" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="725.0" y="105.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">verdict (retval)</text>
<text x="725.0" y="122.0" font-size="11.5" fill="#555555" text-anchor="middle">XDP_DROP / XDP_PASS</text>
