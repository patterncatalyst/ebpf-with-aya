<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="24" y="210" width="548" height="118" rx="12" fill="#fafafa" stroke="#ddd"/>
<text x="36" y="230" font-size="12" font-weight="700" fill="#888">container (user namespace) — no init-ns CAP_BPF</text>
<rect x="40" y="54" width="200" height="58" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="140.0" y="81.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">privileged runtime</text>
<text x="140.0" y="98.0" font-size="11.5" fill="#555555" text-anchor="middle">(init userns)</text>
<rect x="300" y="44" width="250" height="78" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="425.0" y="73.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">bpffs mount</text>
<text x="425.0" y="90.5" font-size="11.5" fill="#555555" text-anchor="middle">delegate_cmds / maps</text>
<text x="425.0" y="105.5" font-size="11.5" fill="#555555" text-anchor="middle">/ progs / attachs</text>
<rect x="48" y="248" width="200" height="62" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="148.0" y="284.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">unprivileged app</text>
<rect x="300" y="250" width="240" height="58" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="420.0" y="277.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">BPF_TOKEN_CREATE</text>
<text x="420.0" y="294.0" font-size="11.5" fill="#555555" text-anchor="middle">→ token fd</text>
<rect x="610" y="132" width="250" height="82" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="735.0" y="163.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">bpf(PROG_LOAD, MAP_CREATE…)</text>
<text x="735.0" y="180.5" font-size="11.5" fill="#555555" text-anchor="middle">checked against the token,</text>
<text x="735.0" y="195.5" font-size="11.5" fill="#555555" text-anchor="middle">not init-ns caps</text>
<path d="M240,82 L300,82" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="270.0" y="74.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">mount + delegate</text>
<text x="270.0" y="74.0" font-size="11" fill="#555" text-anchor="middle">mount + delegate</text>
<path d="M420,122 L420,250" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="474.0" y="186.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">derive token from</text>
<text x="474.0" y="186.0" font-size="11" fill="#b8650a" text-anchor="middle">derive token from</text>
<path d="M248,279 L300,279" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="274.0" y="271.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">open</text>
<text x="274.0" y="271.0" font-size="11" fill="#555" text-anchor="middle">open</text>
<path d="M540,272 L610,196" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="581.0" y="242.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">token_fd</text>
<text x="581.0" y="242.0" font-size="11" fill="#b8650a" text-anchor="middle">token_fd</text>
<text x="440" y="26" font-size="11" fill="#b8650a" text-anchor="middle" font-weight="700">delegating BPF into a container without init-namespace privilege</text>
<text x="440" y="350" font-size="11" fill="#888" text-anchor="middle">the four axes (cmds / maps / progs / attachs) are the policy — the token grants only what was delegated: trust, not unconditional access</text>
</svg>