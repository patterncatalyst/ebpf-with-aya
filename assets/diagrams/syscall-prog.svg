<text x="640.0" y="114.0" font-size="11.5" fill="#555555" text-anchor="middle">in the kernel</text>
<rect x="34" y="196" width="160" height="50" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="114.0" y="226.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">user space</text>
<rect x="250" y="188" width="210" height="66" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="355.0" y="211.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">syscall program</text>
<text x="355.0" y="228.5" font-size="11.5" fill="#555555" text-anchor="middle">bpf_sys_bpf() ×N</text>
<text x="355.0" y="243.5" font-size="11.5" fill="#555555" text-anchor="middle">(runs in kernel)</text>
<rect x="540" y="192" width="200" height="58" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="640.0" y="219.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">the same maps</text>
