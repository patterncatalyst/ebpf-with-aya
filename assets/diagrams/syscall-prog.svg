<path d="M194,99 L250,99" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M460,99 L540,99" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M194,221 L250,221" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="222.0" y="213.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">BPF_PROG_RUN (once)</text>
<text x="222.0" y="213.0" font-size="11" fill="#555" text-anchor="middle">BPF_PROG_RUN (once)</text>
<path d="M460,221 L540,221" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="500.0" y="213.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">bpf_sys_bpf</text>
<text x="500.0" y="213.0" font-size="11" fill="#b8650a" text-anchor="middle">bpf_sys_bpf</text>
<text x="440" y="30" font-size="11" fill="#b8650a" text-anchor="middle" font-weight="700">two ways to create BPF objects: many syscalls from user space, or one program that issues them itself</text>
<text x="150" y="150" font-size="13" fill="#6a6a6a" text-anchor="middle">the usual way</text>
<text x="150" y="272" font-size="13" fill="#b8650a" text-anchor="middle">loader program / light skeleton</text>
<text x="440" y="294" font-size="11" fill="#888" text-anchor="middle">running once replays the load sequence in-kernel — the basis of light skeletons and signed loading</text>
