<text x="355.0" y="97.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">many bpf() syscalls</text>
<text x="355.0" y="114.0" font-size="11.5" fill="#555555" text-anchor="middle">map create, prog load, …</text>
