<text x="720.0" y="287.5" font-size="11.5" fill="#555555" text-anchor="middle">emit completed UnlinkEvent</text>
<path d="M255,142 L345,142" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="306.0" y="136.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">store</text>
<text x="306.0" y="136.0" font-size="11" fill="#555" text-anchor="middle">store</text>
<path d="M515,142 L605,142" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="566.0" y="136.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">lookup + clear</text>
<text x="566.0" y="136.0" font-size="11" fill="#555" text-anchor="middle">lookup + clear</text>
<path d="M720,190 L720,235" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
