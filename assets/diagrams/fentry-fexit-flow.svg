<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="95" width="215" height="95" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="147.5" y="133.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">#[fentry] vfs_unlink</text>
<text x="147.5" y="150.0" font-size="11.5" fill="#555555" text-anchor="middle">capture at ENTRY</text>
<text x="147.5" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">pid / uid / comm / filename</text>
<rect x="345" y="95" width="170" height="95" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="430.0" y="133.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">INFLIGHT</text>
