<text x="430.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">key = pid_tgid</text>
<rect x="605" y="95" width="230" height="95" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="720.0" y="133.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">#[fexit] vfs_unlink</text>
<text x="720.0" y="150.0" font-size="11.5" fill="#555555" text-anchor="middle">read return value</text>
<text x="720.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">at RETURN</text>
