<text x="760.0" y="206.5" font-size="11" fill="#555" text-anchor="middle">submit</text>
<text x="40" y="50" font-size="13" fill="#111111" text-anchor="start" font-weight="700">Correlate entry + return with a map keyed by pid_tgid</text>
<text x="40" y="335" font-size="12" fill="#555" text-anchor="start">fentry sees the arguments; fexit sees the return value; INFLIGHT bridges the two halves of one call.</text>
