<text x="440.0" y="85.0" font-size="11.5" fill="#555555" text-anchor="middle">(or uretprobe)</text>
<rect x="40" y="170" width="240" height="90" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="160.0" y="205.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">executable symbol</text>
<text x="160.0" y="222.5" font-size="11.5" fill="#555555" text-anchor="middle">./app : compute()</text>
<text x="160.0" y="237.5" font-size="11.5" fill="#555555" text-anchor="middle">Ch 14 · 15 · 18</text>
<rect x="320" y="170" width="240" height="90" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="440.0" y="205.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">shared-library symbol</text>
<text x="440.0" y="222.5" font-size="11.5" fill="#555555" text-anchor="middle">libssl: SSL_write · libc: malloc</text>
<text x="440.0" y="237.5" font-size="11.5" fill="#555555" text-anchor="middle">Ch 13 · 17 · 24</text>
<rect x="600" y="170" width="240" height="90" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="720.0" y="205.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">USDT marker</text>
<text x="720.0" y="222.5" font-size="11.5" fill="#555555" text-anchor="middle">libjvm: gc__begin</text>
<text x="720.0" y="237.5" font-size="11.5" fill="#555555" text-anchor="middle">attach at its offset · Ch 20</text>
<text x="440" y="25" font-size="11" fill="#888" text-anchor="middle" font-weight="700">user-space probing: attach to a symbol or marker in a binary</text>
<text x="440" y="292" font-size="11" fill="#b8650a" text-anchor="middle">entry probe sees args (C ABI: RDI, RSI, …); return probe sees the result — but mind non-C ABIs (Go) and never uretprobe Go</text>
