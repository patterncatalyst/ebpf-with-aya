<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="50" width="340" height="220" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="52" y="70" font-size="12" font-weight="700" fill="#888">C ABI — what ctx.arg(n) assumes</text>
<rect x="440" y="50" width="340" height="220" rx="12" fill="#fff8ef" stroke="#ddd"/>
<text x="452" y="70" font-size="12" font-weight="700" fill="#888">Go ABIInternal (1.17+)</text>
<rect x="70" y="95" width="280" height="44" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="210.0" y="122.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">arg0 → RDI</text>
<rect x="70" y="150" width="280" height="44" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="210.0" y="177.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">arg1 → RSI</text>
<rect x="70" y="205" width="280" height="44" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="210.0" y="232.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">arg2 → RDX</text>
<rect x="470" y="95" width="280" height="44" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="610.0" y="122.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">arg0  gp      → RAX</text>
<rect x="470" y="150" width="280" height="44" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="610.0" y="177.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">arg1  oldval  → RBX</text>
<rect x="470" y="205" width="280" height="44" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="610.0" y="232.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">arg2  newval  → RCX</text>
<text x="410" y="290" font-size="11" fill="#b8650a" text-anchor="middle">so ctx.arg(2) reads RDX (wrong); newval is really in RCX — read pt_regs directly</text>
</svg>