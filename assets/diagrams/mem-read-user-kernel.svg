<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 348" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="150" width="380" height="150" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="52" y="170" font-size="12" font-weight="700" fill="#888">user memory</text>
<rect x="460" y="150" width="380" height="150" rx="12" fill="#f4f4f4" stroke="#ddd"/>
<text x="472" y="170" font-size="12" font-weight="700" fill="#888">kernel memory</text>
<rect x="350" y="45" width="180" height="64" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="440.0" y="75.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">eBPF program</text>
<text x="440.0" y="92.0" font-size="11.5" fill="#555555" text-anchor="middle">verifier-checked</text>
<rect x="70" y="195" width="320" height="70" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="230.0" y="228.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">argv · filenames · TLS buffers</text>
<text x="230.0" y="245.0" font-size="11.5" fill="#555555" text-anchor="middle">(the process&#x27;s address space)</text>
<rect x="490" y="195" width="320" height="70" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="650.0" y="228.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">task_struct · files · sk_buff</text>
<text x="650.0" y="245.0" font-size="11.5" fill="#555555" text-anchor="middle">(kernel address space)</text>
<text x="440" y="322" font-size="11" fill="#b8650a" text-anchor="middle">raw pointer deref is forbidden — a helper copies bytes into a BPF-stack buffer</text>
<text x="440" y="340" font-size="11" fill="#888" text-anchor="middle">this is how chapters 9–12 read the data they report</text>
