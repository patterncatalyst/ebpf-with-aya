<text x="170.0" y="152.0" font-size="11" fill="#b8650a">bpf_probe_read_user()</text>
<path d="M470,109 L650,195" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="570.0" y="152.0" font-size="11" fill="#b8650a">bpf_probe_read_kernel()</text>
