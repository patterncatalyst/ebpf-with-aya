<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="34" y="120" width="150" height="60" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="109.0" y="148.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">loader</text>
<text x="109.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">loads, pins, exits</text>
<rect x="240" y="78" width="180" height="42" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="330.0" y="104.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">program (tracepoint)</text>
<rect x="240" y="128" width="180" height="42" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="330.0" y="154.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">map — exec count</text>
<rect x="240" y="178" width="180" height="42" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="330.0" y="204.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">link — attachment</text>
<rect x="470" y="104" width="180" height="108" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="560.0" y="148.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">/sys/fs/bpf</text>
<text x="560.0" y="165.5" font-size="11.5" fill="#555555" text-anchor="middle">(bpffs)</text>
<text x="560.0" y="180.5" font-size="11.5" fill="#555555" text-anchor="middle">pins hold references</text>
<rect x="706" y="120" width="144" height="60" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="778.0" y="148.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">any reader</text>
<text x="778.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">opens the map</text>
<path d="M184,150 L240,149" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="212.0" y="141.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">load + attach</text>
<text x="212.0" y="141.5" font-size="11" fill="#555" text-anchor="middle">load + attach</text>
<path d="M420,99 L470,130" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M420,149 L470,150" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="445.0" y="141.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">pin</text>
<text x="445.0" y="141.5" font-size="11" fill="#b8650a" text-anchor="middle">pin</text>
<path d="M420,199 L470,182" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M706,150 L650,158" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="672.0" y="146.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">open</text>
<text x="672.0" y="146.0" font-size="11" fill="#555" text-anchor="middle">open</text>
<text x="440" y="30" font-size="11" fill="#b8650a" text-anchor="middle" font-weight="700">pin to bpffs and the program, map, and link outlive the loader — until the pin is removed</text>
<text x="440" y="284" font-size="11" fill="#888" text-anchor="middle">the loader can exit; another process reads the pinned map; rm the pin to drop the reference and detach</text>
</svg>